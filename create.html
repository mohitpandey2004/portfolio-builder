<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Portfolio</title>
    <!-- Browser Tab Logo (Favicon) Fix -->
<!-- ORIGINAL BRAND LOGO: THE CYBER CORE NEXUS -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' width='96' height='96'><defs><linearGradient id='mohitBrand2' x1='0% ' y1='0% ' x2='100% ' y2='100% '><stop offset='0% ' stop-color='%2300eeff'/><stop offset='100% ' stop-color='%23ff007f'/></linearGradient></defs><path fill='none' stroke='url(%23mohitBrand2)' stroke-width='3' stroke-linejoin='round' d='M16 3l11 6v12l-11 8-11-8V9l11-6z'/><circle cx='16' cy='15' r='3' fill='%23ff007f'/><path fill='%2300eeff' d='M16 7v3m-5 5h3m5 0h3'/></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="create-style.css">
</head>
<body>

    <div class="builder-container">
        <a href="index.html" class="back-home">← Back to Portfolio</a>
        <h1 class="builder-title">Portfolio Builder</h1>
        
        <form action="insert.php" method="POST" enctype="multipart/form-data">
            
            <div class="form-section-title"><i class="fa-solid fa-user"></i> Personal Info</div>
            
            <div class="input-group">
                <input type="file" name="user_image" accept="image/*" required style="border: none; padding: 5px 0;">
                <label style="top: -22px; color: #ff007f; font-size: 0.85rem;">Upload Your Profile Photo (JPG/PNG)</label>
            </div>

            <div class="input-group">
                <input type="text" name="user_name" required>
                <label>Your Full Name</label>
            </div>
            
            <div class="input-group">
                <input type="text" name="user_title" required>
                <label>Professional Title (e.g. Web Developer)</label>
            </div>

            <div class="input-group">
                <input type="text" name="user_typed_text" placeholder="e.g. Web Developer, Android Developer, Designer" required>
                <label>Animated Skills (Comma separated)</label>
            </div>

            <div class="form-section-title"><i class="fa-solid fa-address-card"></i> About & Skills Section</div>
            <div class="input-group">
                <textarea name="user_about" rows="4" required></textarea>
                <label>Tell something about yourself...</label>
            </div>

            <div class="input-group">
                <input type="text" name="user_skills" placeholder="e.g. HTML, CSS, JavaScript, Kotlin, Java" required>
                <label>Your Tech Skills (Comma separated)</label>
            </div>

            <div class="form-section-title"><i class="fa-solid fa-address-book"></i> Contact Info</div>
            <div class="input-group">
                <input type="email" name="user_email" required>
                <label>Public Email Address</label>
            </div>
            <div class="input-group">
                <input type="text" name="user_phone" required>
                <label>Phone Number</label>
            </div>
            <div class="input-group">
                <input type="text" name="user_location" required>
                <label>Location (City, State)</label>
            </div>

            <div style="margin-top: 40px; text-align: center;">
                <button type="submit" class="cyber-btn">
                    <span>Generate & Download Zip_</span>
                </button>
            </div>
        </form>
    </div>

</body>
</html>
